<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>面相识别</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #000;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      padding: 12px 16px;
      padding-top: calc(44px + env(safe-area-inset-top));
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #fff;
      position: absolute;
      top: 0;
      width: 100%;
      z-index: 10;
    }

    .camera-view {
      flex: 1;
      background: #333;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 面部引导框 - 椭圆形 */
    .guide-frame {
      width: 280px;
      height: 380px;
      border: 2px dashed rgba(255,255,255,0.6);
      border-radius: 140px; 
      position: relative;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.6);
    }

    .scan-line {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: #667eea;
      box-shadow: 0 0 10px #667eea;
      animation: scan 3s infinite linear;
    }

    @keyframes scan {
      0% { top: 0; opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }

    .guide-text {
      position: absolute;
      bottom: 140px;
      width: 100%;
      text-align: center;
      color: #fff;
      font-size: 14px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }

    .result-bubble {
      position: absolute;
      top: 20%;
      right: 10%;
      background: rgba(255,255,255,0.9);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12px;
      color: #333;
      animation: popIn 0.5s 1s forwards;
      opacity: 0;
      transform: scale(0);
    }

    @keyframes popIn { to { opacity: 1; transform: scale(1); } }

    .controls {
      background: #000;
      padding: 30px 40px;
      padding-bottom: calc(40px + env(safe-area-inset-bottom));
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .btn-mini {
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .shutter-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 4px solid #fff;
      position: relative;
      cursor: pointer;
    }

    .shutter-inner {
      width: 56px;
      height: 56px;
      background: #fff;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
  </style>
</head>
<body>
  <div class="navbar">
    <div>✕</div>
    <div>面相识别</div>
    <div>帮助</div>
  </div>

  <div class="camera-view">
    <div class="guide-frame">
      <div class="scan-line"></div>
    </div>
    <div class="guide-text">请移除眼镜，保持正脸</div>
    
    <!-- 模拟实时识别结果 -->
    <div class="result-bubble">面色微黄</div>
  </div>

  <div class="controls">
    <div class="btn-mini">⚡</div>
    <div class="shutter-btn">
      <div class="shutter-inner"></div>
    </div>
    <div class="btn-mini">📷</div>
  </div>
</body>
</html>
