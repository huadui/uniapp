<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>医案记录</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    :root {
      --primary: #8B5A2B;
      --bg: #F7F5F0;
      --card-bg: #FFFFFF;
      --text-main: #4A4A4A;
      --border: #E8E0D5;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: "PingFang SC", "Kaiti SC", "STKaiti", serif;
      background-color: var(--bg);
      background-image: radial-gradient(#E8E6E1 1px, transparent 1px);
      background-size: 20px 20px;
      padding-bottom: 90px;
      color: var(--text-main);
    }

    /* 顶部导航 */
    .navbar {
      background: rgba(247, 245, 240, 0.95);
      backdrop-filter: blur(10px);
      padding: 12px 20px;
      padding-top: calc(44px + env(safe-area-inset-top));
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-title { font-size: 18px; font-weight: 600; color: #333; font-family: "Kaiti SC", "STKaiti", serif; }
    .clear-btn { position: absolute; right: 20px; color: #888; font-size: 14px; }

    .list-container { padding: 20px; }

    /* 时间轴样式优化 */
    .timeline-block { position: relative; padding-left: 24px; margin-bottom: 24px; }
    .timeline-block::before {
      content: '';
      position: absolute;
      left: 6px; top: 28px; bottom: -20px;
      width: 1px; background: #D8D0C5;
      border-left: 1px dashed #D8D0C5;
    }
    .timeline-block:last-child::before { display: none; }

    .date-label {
      font-size: 14px;
      font-weight: bold;
      color: #8B5A2B;
      margin-bottom: 12px;
      position: relative;
    }
    
    .date-label::before {
      content: '';
      position: absolute;
      left: -28px; top: 4px;
      width: 12px; height: 12px;
      background: #8B5A2B;
      border: 3px solid #F7F5F0;
      border-radius: 50%;
      box-shadow: 0 0 0 1px #8B5A2B;
    }

    .record-card {
      background: #fff;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      gap: 16px;
      align-items: flex-start;
      box-shadow: 0 2px 8px rgba(139, 90, 43, 0.08);
      border: 1px solid #E8E0D5;
      position: relative;
    }

    .record-card::after {
      content: '';
      position: absolute;
      top: 4px; bottom: 4px; left: 4px;
      width: 2px;
      background-image: linear-gradient(to bottom, #8B5A2B 33%, transparent 0%);
      background-size: 1px 6px;
      opacity: 0.3;
    }

    .record-icon-box {
      width: 40px; height: 40px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .bg-ink { background: #F0EBE5; color: #4A4A4A; }
    .bg-red { background: #FBE8E6; color: #C84C42; }

    .record-content { flex: 1; }
    .record-title { font-size: 16px; font-weight: 600; color: #333; margin-bottom: 4px; font-family: "Kaiti SC", "STKaiti", serif; }
    .record-desc { font-size: 13px; color: #666; line-height: 1.5; margin-bottom: 10px; }
    
    .tags { display: flex; gap: 6px; }
    .tag { 
      font-size: 10px; 
      padding: 2px 6px; 
      border-radius: 4px; 
      background: #F7F5F0; 
      color: #8B5A2B; 
      border: 1px solid #E0D8CE;
    }

    .time { font-size: 12px; color: #bbb; margin-top: 8px; text-align: right; font-family: "Georgia", serif; font-style: italic; }

    /* 底部 Tab */
    .tabbar {
      position: fixed;
      bottom: 20px;
      left: 20px; right: 20px;
      height: 60px;
      background: #fff;
      border-radius: 30px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      box-shadow: 0 8px 30px rgba(0,0,0,0.1);
      border: 1px solid rgba(0,0,0,0.05);
      z-index: 100;
    }

    .tab-item {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: #999;
      flex: 1; height: 100%;
    }

    .tab-item.active { color: #8B5A2B; }
    
    .tab-icon { font-size: 24px; margin-bottom: 2px; }
    .tab-text { font-size: 10px; font-weight: 500; }
  </style>
</head>
<body>
  <div class="navbar">
    <div class="nav-title">医案记录</div>
    <div class="clear-btn"><i class="ri-delete-bin-line"></i> 清空</div>
  </div>

  <div class="list-container">
    <!-- 今天 -->
    <div class="timeline-block">
      <div class="date-label">今日 · 乙巳年十月廿三</div>
      
      <div class="record-card">
        <div class="record-icon-box bg-ink"><i class="ri-question-answer-line"></i></div>
        <div class="record-content">
          <div class="record-title">问诊脉络</div>
          <div class="record-desc">主诉：失眠多梦，心烦易怒，伴有口苦咽干。</div>
          <div class="tags">
            <div class="tag">气郁质</div>
            <div class="tag">肝火旺</div>
          </div>
          <div class="time">14:30</div>
        </div>
      </div>

      <div class="record-card">
        <div class="record-icon-box bg-red"><i class="ri-camera-lens-line"></i></div>
        <div class="record-content">
          <div class="record-title">观舌知病</div>
          <div class="record-desc">舌质红，苔黄腻，齿痕明显。</div>
          <div class="tags">
            <div class="tag">湿热质</div>
          </div>
          <div class="time">09:15</div>
        </div>
      </div>
    </div>

    <!-- 昨天 -->
    <div class="timeline-block">
      <div class="date-label">昨日 · 乙巳年十月廿二</div>
      <div class="record-card">
        <div class="record-icon-box bg-ink"><i class="ri-question-answer-line"></i></div>
        <div class="record-content">
          <div class="record-title">问诊脉络</div>
          <div class="record-desc">咨询关于秋季养生的问题。</div>
          <div class="tags">
            <div class="tag">健康科普</div>
          </div>
          <div class="time">20:00</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 底部 Tab -->
  <div class="tabbar">
    <div class="tab-item">
      <div class="tab-icon"><i class="ri-home-smile-2-line"></i></div>
      <div class="tab-text">医馆</div>
    </div>
    <div class="tab-item active">
      <div class="tab-icon"><i class="ri-history-line"></i></div>
      <div class="tab-text">医案</div>
    </div>
    <div class="tab-item">
      <div class="tab-icon"><i class="ri-user-3-line"></i></div>
      <div class="tab-text">我的</div>
    </div>
  </div>
</body>
</html>
