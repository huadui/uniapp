<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>舌象识别</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #000;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      padding: 12px 16px;
      padding-top: calc(44px + env(safe-area-inset-top));
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #fff;
      position: absolute;
      top: 0;
      width: 100%;
      z-index: 10;
    }

    .camera-view {
      flex: 1;
      background: #333;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .guide-frame {
      width: 260px;
      height: 340px;
      border: 2px solid rgba(255,255,255,0.6);
      border-radius: 140px; /* 模拟舌头形状 */
      position: relative;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.6); /* 遮罩 */
    }

    .guide-text {
      position: absolute;
      bottom: 160px;
      width: 100%;
      text-align: center;
      color: #fff;
      font-size: 14px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }

    .controls {
      background: #000;
      padding: 30px 40px;
      padding-bottom: calc(40px + env(safe-area-inset-bottom));
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .btn-mini {
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .shutter-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 4px solid #fff;
      position: relative;
      cursor: pointer;
    }

    .shutter-inner {
      width: 56px;
      height: 56px;
      background: #fff;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      transition: transform 0.1s;
    }

    .shutter-btn:active .shutter-inner { transform: translate(-50%, -50%) scale(0.9); }

    /* 结果弹窗模拟 */
    .result-panel {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #fff;
      border-radius: 24px 24px 0 0;
      padding: 20px;
      padding-bottom: calc(20px + env(safe-area-inset-bottom));
      transform: translateY(0);
      transition: transform 0.3s;
    }

    .panel-handle {
      width: 40px;
      height: 4px;
      background: #ddd;
      border-radius: 2px;
      margin: 0 auto 16px;
    }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .result-title { font-size: 18px; font-weight: 600; }
    .score { font-size: 24px; color: #667eea; font-weight: 700; }

    .feature-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .feature-item {
      background: #f8f9fa;
      padding: 12px;
      border-radius: 12px;
    }

    .f-label { font-size: 12px; color: #999; margin-bottom: 4px; }
    .f-value { font-size: 15px; font-weight: 500; color: #333; }

    .health-advice {
      font-size: 14px;
      color: #666;
      line-height: 1.6;
      background: #f0f5ff;
      padding: 12px;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <div>✕</div>
    <div>舌象拍摄</div>
    <div>帮助</div>
  </div>

  <div class="camera-view">
    <div class="guide-frame"></div>
    <div class="guide-text">请将舌头对准参考线<br>保持光线充足</div>
  </div>

  <div class="result-panel">
    <div class="panel-handle"></div>
    <div class="result-header">
      <div class="result-title">识别结果</div>
      <div class="score">湿热质</div>
    </div>
    <div class="feature-grid">
      <div class="feature-item">
        <div class="f-label">舌质颜色</div>
        <div class="f-value">红</div>
      </div>
      <div class="feature-item">
        <div class="f-label">舌苔形态</div>
        <div class="f-value">黄腻</div>
      </div>
      <div class="feature-item">
        <div class="f-label">齿痕</div>
        <div class="f-value">无明显齿痕</div>
      </div>
      <div class="feature-item">
        <div class="f-label">裂纹</div>
        <div class="f-value">舌中微裂</div>
      </div>
    </div>
    <div class="health-advice">
      <strong>AI 分析建议：</strong><br>
      近期可能饮食偏油腻，建议清淡饮食，多喝温水。可适量食用赤小豆、薏米等祛湿食材。
    </div>
  </div>

  <div class="controls">
    <div class="btn-mini">🖼️</div>
    <div class="shutter-btn">
      <div class="shutter-inner"></div>
    </div>
    <div class="btn-mini">🔄</div>
  </div>
</body>
</html>
